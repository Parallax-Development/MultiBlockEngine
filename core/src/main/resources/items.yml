items:
  wrench:
    key: mbe:wrench
    material: IRON_HOE
    display-name: "mbe:core.items.wrench.display_name"
    lore:
      - "mbe:core.items.wrench.lore.execute"
      - "mbe:core.items.wrench.lore.change_mode"
      - "mbe:core.items.wrench.lore.disassemble"
  wire_cutter:
    key: mbe:wire_cutter
    material: SHEARS
    display-name: "mbe:core.items.wire_cutter.display_name"
    lore:
      - "mbe:core.items.wire_cutter.lore.execute"
      - "mbe:core.items.wire_cutter.lore.change_mode"
  blueprint:
    key: mbe:blueprint
    material: PAPER
    display-name: "mbe:core.items.blueprint.display_name"
    unstackable: true
    lore:
      - "mbe:core.items.blueprint.lore.hold"
      - "mbe:core.items.blueprint.lore.right_click"
      - "mbe:core.items.blueprint.lore.left_click"
