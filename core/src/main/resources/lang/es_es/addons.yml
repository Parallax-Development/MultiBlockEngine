addons:
  router:
    overview:
      usage: "&eUso:"
      list: "&7/{label} addons list"
      status: "&7/{label} addons status <addonId>"
    list:
      title: "&eAddons cargados ({count}):"
      entry: "&7- {id} &8v{version} [{state}&8]"
      none: "&7No hay addons cargados."
    status:
      title: "&eAddon: {id}"
      version: "&7Versión: {version}"
      state: "&7Estado: {state}"
      dependencies: "&7Dependencias: {deps}"
      services_title: "&7Servicios registrados ({count}):"
      service_entry: "&7  - {serviceId}"
      no_services: "&7  Sin servicios registrados."
      not_found: "&cAddon no encontrado: {id}"
    error:
      generic: "&cComando de addons inválido."
