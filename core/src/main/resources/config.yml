# MultiBlockEngine Configuration

# Enable debug mode to see verbose logging in console
debug: false

# Enable performance metrics collection
metrics: true

logging:
  level: INFO
  debug: false
  debugCore: false
  debugAddons: false
  debugAddonsById: []

i18n:
  debugMissingKeys: false

# Database configuration (for future use if we switch from internal SQLite)
database:
  type: sqlite

export:
  includeAir: false
  includeBlockStates: true
  includeNbt: false
  includeWaterlogged: false
  ignoreMaterials:
    - TORCH
    - WALL_TORCH

addons:
  contracts:
    # Valid values: WARN, ERROR
    nonApiAccess: WARN
    serviceApiType: WARN

preview:
  batchSize: 30
  timeoutSeconds: 20
  maxDistance: 24.0
  raycastDistance: 8

placeholder:
  cache-ttl-ms: 1000
  max-list-size: 50

metadata:
  placeholder-cache-ttl-ms: 1000
  placeholder-context-max-distance: 12.0
